// ========== FIRESTORE ==========
async function save() {
    if (!U) return;
    try {
        await db.collection('users').doc(U.uid).set({ data: JSON.stringify(D), updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
    } catch (e) {
        console.error('Erro ao salvar:', e);
        toast('Erro ao salvar dados', true);
    }
}

async function load() {
    if (!U) return;
    try {
        const doc = await db.collection('users').doc(U.uid).get();
        if (doc.exists && doc.data().data) {
            D = JSON.parse(doc.data().data);
            // Ensure new fields exist
            if (!D.foods) D.foods = getDefaultFoods();
            if (!D.goals) D.goals = defaultD().goals;
            if (!D.vitals) D.vitals = {};
            if (!D.dayType) D.dayType = {};
            if (!D.water) D.water = {};
            if (!D.days) D.days = {};
            if (!D.bphCutoff) D.bphCutoff = 17;
        } else {
            D = defaultD();
            await save();
        }
    } catch (e) {
        console.error('Erro ao carregar:', e);
        D = defaultD();
    }
}

// ========== AUTH ==========
function loginEmail() {
    const email = $('login-email').value.trim();
    const pass = $('login-pass').value;
    if (!email || !pass) return toast('Preencha email e senha', true);
    auth.signInWithEmailAndPassword(email, pass).catch(e => {
        if (e.code === 'auth/user-not-found') {
            toast('UsuÃ¡rio nÃ£o encontrado', true);
        } else if (e.code === 'auth/wrong-password') {
            toast('Senha incorreta', true);
        } else {
            toast('Erro: ' + e.message, true);
        }
    });
}

function registerEmail() {
    const email = $('login-email').value.trim();
    const pass = $('login-pass').value;
    if (!email || !pass) return toast('Preencha email e senha', true);
    if (pass.length < 6) return toast('Senha mÃ­nima: 6 caracteres', true);
    auth.createUserWithEmailAndPassword(email, pass).catch(e => toast('Erro: ' + e.message, true));
}

function loginGoogle() {
    const provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithPopup(provider).catch(e => toast('Erro: ' + e.message, true));
}

function logout() {
    if (confirm('Sair da conta?')) auth.signOut();
}

auth.onAuthStateChanged(async user => {
    U = user;
    if (user) {
        await load();
        showPage('dash');
        $('bottom-nav').classList.remove('hidden');
        if (D.theme === 'light') document.body.classList.add('light');
    } else {
        D = null;
        showPage('login');
        $('bottom-nav').classList.add('hidden');
    }
});

// ========== NAVIGATION ==========
function showPage(name) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    const pageEl = $('page-' + name);
    if (pageEl) pageEl.classList.add('active');
    cPage = name;

    document.querySelectorAll('.nav-item').forEach(n => {
        n.classList.toggle('active', n.dataset.page === name);
    });

    // Render
    if (name === 'dash') rDash();
    else if (name === 'meal') rMeal();
    else if (name === 'hydro') rHydro();
    else if (name === 'goals') rGoals();
}

// ========== HELPERS: DAY DATA ==========
function getDayData(dt) {
    if (!dt) dt = today();
    if (!D.days[dt]) D.days[dt] = { slots: {} };
    return D.days[dt];
}

function getDayType(dt) {
    if (!dt) dt = today();
    if (D.dayType[dt]) return D.dayType[dt];
    const dow = getDayOfWeek(dt);
    return dow === 0 ? 'descanso' : 'treino'; // domingo = descanso
}

function setDayType(dt, type) {
    D.dayType[dt] = type;
    save();
}

function getGoals(dv) {
    return D.goals[getDayType(dt)] || D.goals.treino;
}

function getDayMeals(dt) {
    const day = getDayData(dt);
    let totalKcal = 0, totalProt = 0;
    MEAL_SLOTS.forEach(s => {
        const slot = day.slots[s.id];
        if (slot && slot.items) {
            slot.items.forEach(item => {
                totalKcal += item.kcal || 0;
                totalProt += item.prot || 0;
            });
        }
    });
    return { totalKcal, totalProt };
}

function getDayWater(dt) {
    if (!dt) dt = today();
    if (!D.water[dt]) D.water[dt] = [];
    return D.water[dt].reduce((s, e) => s + (e.vol || 0), 0);
}

function getWaterEntries(dt) {
    if (!dt) dt = today();
    if (!D.water[dt]) D.water[dt] = [];
    return D.water[dt];
}

function openMealSlot(slotId) {

}

// ========== RENDER: ADD MEAL ==========
function rMeal() {
    if (!D) return;
    const dt = today();
    const day = getDayData(dt);

    // Chips
    let chipsHtml = '';
    MEAL_SLOTS.forEach(s => {
        chipsHtml += `<button class="chip ${selectedMealSlot === s.id ? 'active' : ''}" onclick="selectedMealSlot='${s.id}';rMeal()">${s.name}</button>`;
    });

    // Current items
    const slot = day.slots[selectedMealSlot] || { items: [] };
    let itemsHtml = '';
    let totalKcal = 0, totalProt = 0;
    if (slot.items && slot.items.length > 0) {
        slot.items.forEach((item, i) => {
            totalKcal += item.kcal || 0;
            totalProt += item.prot || 0;
            itemsHtml += `
                <div class="added-item">
                    <button class="added-remove" onclick="removeMealItem(${i})">Ã</button>
                    <div style="flex:1">
                        <div style="font-size:13px;font-weight:600;color:var(--text)">${item.name}</div>
                        <div style="font-size:11px;color:var(--text3)">${fmt(item.grams)}g</div>
                    </div>
                    <div class="text-right">
                        <div style="font-size:12px;font-weight:600">${fmtN(item.kcal)} kcal</div>
                        <div style="font-size:10px;color:var(--primary)">${fmt(item.prot)}g prot</div>
                    </div>
                </div>`;
        });
    }

    // Food list
    let foodsHtml = '';
    D.foods.forEach(f => {
        foodsHtml += `
            <div class="food-item" onclick="openAddFood('${f.id}')">
                <div class="food-info">
                    <div class="food-name">${f.name}</div>
                    <div class="food-detail">Ref: ${f.ref}${f.unit} â¢ ${fmt(f.kcal)} kcal â¢ ${fmt(f.prot)}g prot</div>
                </div>
                <div class="food-add-btn">+</div>
            </div>`;
    });

    $('meal-body').innerHTML = `
        <div class="chip-row">${chipsHtml}</div>

        ${slot.items && slot.items.length > 0 ? `
        <div class="card mb-12">
            <div class="card-title">Itens â ${MEAL_SLOTS.find(s=>s.id===selectedMealSlot).name}</div>
            ${itemsHtml}
            <div class="added-total">
                <span>Total</span>
                <span>${fmtN(totalKcal)} kcal &nbsp; <span style="color:var(--primary)">${fmt(totalProt)}g prot</span></span>
            </div>
        </div>` : ''}

        <div class="card">
            <div class="card-title">Adicionar Alimento</div>
            <div class="search-box">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" placeholder="Buscar alimento..." id="food-search" oninput="filterFoods()">
            </div>
            <div id="food-list">${foodsHtml}</div>
        </div>
    `;
}

function filterFoods() {
    const q = $('food-search').value.toLowerCase();
    let html = '';
    D.foods.filter(f => f.name.toLowerCase().includes(q)).forEach(f => {
        html += `
            <div class="food-item" onclick="openAddFood('${f.id}')">
                <div class="food-info">
                    <div class="food-name">${f.name}</div>
                    <div class="food-detail">Ref: ${f.ref}${f.unit} â¢ ${fmt(f.kcal)} kcal â¢ ${fmt(f.prot)}g prot</div>
                </div>
                <div class="food-add-btn">+</div>
            </div>`;
    });
    $('food-list').innerHTML = html;
}

function openAddFood(foodId) {
    const food = D.foods.find(f => f.id === foodId);
    if (!food) return;

    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.onclick = e => { if (e.target === overlay) overlay.remove(); };
    overlay.innerHTML = `
        <div class="modal-box">
            <div class="modal-header">
                <h3>${food.name}</h3>
                <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">Ã</button>
            </div>
            <p style="font-size:12px;color:var(--text3);margin-bottom:12px">Ref: ${food.ref}${food.unit} = ${fmt(food.kcal)} kcal / ${fmt(food.prot)}g prot</p>
            <div class="form-group">
                <label class="form-label">Quantidade (gramas)</label>
                <input type="number" id="food-grams" class="form-input" value="${food.ref}" inputmode="decimal" autofocus>
            </div>
            <div id="food-calc" style="font-size:13px;color:var(--text2);margin-bottom:16px">
                = ${fmt(food.kcal)} kcal / ${fmt(food.prot)}g prot
            </div>
            <button class="btn btn-primary w-full" onclick="addFoodToMeal('${food.id}')">Adicionar</button>
        </div>
    `;
    document.body.appendChild(overlay);

    // Real-time calc
    const gramsInput = $('food-grams');
    gramsInput.addEventListener('input', () => {
        const g = parseFloat(gramsInput.value) || 0;
        const ratio = g / food.ref;
        $('food-calc').textContent = `= ${fmt(food.kcal * ratio)} kcal / ${fmt(food.prot * ratio)}g prot`;
    });
    gramsInput.select();
}

function addFoodToMeal(foodId) {
    const food = D.foods.find(f => f.id === foodId);
    if (!food) return;
    const grams = parseFloat($('food-grams').value) || 0;
    if (grams <= 0) return toast('Informe a quantidade', true);

    const ratio = grams / food.ref;
    const dt = today();
    const day = getDayData(dt);
    if (!day.slots[selectedMealSlot]) day.slots[selectedMealSlot] = { items: [], time: MEAL_SLOTS.find(s=>s.id===selectedMealSlot).time };
    day.slots[selectedMealSlot].items.push({
        id: uid(),
        foodId: food.id,
        name: food.name,
        grams: grams,
        kcal: Math.round(food.kcal * ratio * 10) / 10,
        prot: Math.round(food.prot * ratio * 10) / 10
    });

    save();
    document.querySelector('.modal-overlay').remove();
    toast(food.name + ' adicionado');
    rMeal();
}

function removeMealItem(index) {
    const dt = today();
    const day = getDayData(dt);
    const slot = day.slots[selectedMealSlot];
    if (slot && slot.items) {
        slot.items.splice(index, 1);
        save();
        rMeal();
    }
}

function saveMeal() {
    save();
    toast('RefeiÃ§Ã£o salva!');
    showPage('dash');
}

// ========== RENDER: HYDRATION ==========
function rHydro() {
    if (!D) return;
    const dt = today();
    const goals = getGoals(dt);
    const entries = getWaterEntries(dt);
    const totalWater = entries.reduce((s, e) => s + e.vol, 0);
    const pct = goals.water > 0 ? Math.round(totalWater / goals.water * 100) : 0;

    let blocksHtml = '';
    HYDRO_BLOCKS.forEach(b => {
        const blockEntries = entries.filter(e => {
            const hDecimal = parseInt(e.time.split(':')[0]) + parseInt(e.time.split(':')[1]) / 60;
            return hDecimal >= b.startH && hDecimal < b.endH;
        });
        const blockVol = blockEntries.reduce((s, e) => s + e.vol, 0);
        const blockPct = b.target > 0 ? Math.min(blockVol / b.target * 100, 100) : 0;
        const isLocked = b.startH >= D.bphCutoff;
        const isAlert = b.id === 'bloco3';

        let entriesHtml = '';
        blockEntries.forEach(e => {
            entriesHtml += `
                <div class="hydro-entry">
                    <span class="hydro-entry-time">${e.time}</span>
                    <span class="hydro-entry-vol">${e.vol}ml</span>
                    <span>${e.source || ''}</span>
                    ${e.auto ? '<span class="badge badge-green">auto</span>' : ''}
                </div>`;
        });

        const barColor = blockPct >= 100 ? 'var(--green)' : isAlert ? 'var(--yellow)' : 'var(--blue)';
        const barBg = blockPct >= 100 ? 'var(--green-bg)' : isAlert ? 'var(--yellow-bg)' : 'var(--blue-bg)';

        blocksHtml += `
            <div class="card hydro-block" style="${isAlert && blockVol === 0 ? 'border-color:var(--yellow);box-shadow:0 0 0 2px var(--yellow-bg)' : ''}">
                <div class="hydro-header">
                    <div>
                        <div class="hydro-period">${b.period}</div>
                        <div class="hydro-strategy">${b.strategy}</div>
                    </div>
                    <div class="hydro-vol" style="color:${blockPct >= 100 ? 'var(--green)' : isAlert && blockVol === 0 ? 'var(--yellow)' : 'var(--text3)'}">
                        ${blockVol}/${b.target}ml
                    </div>
                </div>
                <div class="progress-bar" style="height:6px"><div class="progress-fill" style="width:${blockPct}%;background:${barColor}"></div></div>
                ${entriesHtml ? `<div class="hydro-entries">${entriesHtml}</div>` : ''}
                ${!isLocked && blockEntries.length === 0 ? `<button class="hydro-add-btn" onclick="openAddWater('${b.id}')">+ Registrar Ã¡gua</button>` : ''}
                ${!isLocked && blockEntries.length > 0 ? `<button class="hydro-add-btn" onclick="openAddWater('${b.id}')">+ Adicionar mais</button>` : ''}
                ${isLocked ? '<div class="hydro-locked">ð Bloqueado â EstratÃ©gia BPH ativa</div>' : ''}
            </div>`;
    });

    $('hydro-body').innerHTML = `
        <div style="background:linear-gradient(135deg,#059669,#10b981,#34d399);border-radius:12px;padding:16px;color:#fff;text-align:center;margin-bottom:16px">
            <div style="font-size:11px;opacity:.8;text-transform:uppercase;letter-spacing:.5px">Total hoje</div>
            <div style="font-size:32px;font-weight:700">${fmtN(totalWater)} ml</div>
            <div style="font-size:12px;opacity:.8">de ${fmtN(goals.water)} ml (${pct}%)</div>
            <div style="margin-top:10px">
                <div class="progress-bar" style="height:6px;background:rgba(255,255,255,0.25)"><div class="progress-fill" style="width:${Math.min(pct,100)}%;background:rgba(255,255,255,0.9)"></div></div>
            </div>
        </div>
        ${blocksHtml}
    `;
}

function openAddWater(blockId) {
    const block = blockId ? HYDRO_BLOCKS.find(b => b.id === blockId) : null;
    const now = new Date();
    const timeStr = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');

    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.onclick = e => { if (e.target === overlay) overlay.remove(); };
    overlay.innerHTML = `
        <div class="modal-box">
            <div class="modal-header">
                <h3>Registrar Ãgua</h3>
                <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">Ã</button>
            </div>
            ${block ? `<p style="font-size:12px;color:var(--text3);margin-bottom:12px">Bloco: ${block.period}</p>` : ''}
            <div class="form-group">
                <label class="form-label">Volume (ml)</label>
                <input type="number" id="water-vol" class="form-input" value="250" inputmode="numeric">
            </div>
            <div style="display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap">
                ${[150, 200, 250, 350, 500, 750].map(v => `<button class="btn btn-outline btn-sm" onclick="$('water-vol').value=${v}">${v}ml</button>`).join('')}
            </div>
            <div class="form-group">
                <label class="form-label">HorÃ¡rio</label>
                <input type="time" id="water-time" class="form-input" value="${timeStr}">
            </div>
            <div class="form-group">
                <label class="form-label">Fonte (opcional)</label>
                <input type="text" id="water-source" class="form-input" placeholder="Ex: garrafa, treino...">
            </div>
            <button class="btn btn-primary w-full" onclick="addWater()">Registrar</button>
        </div>
    `;
    document.body.appendChild(overlay);
    $('water-vol').select();
}

function addWater() {
    const vol = parseInt($('water-vol').value) || 0;
    if (vol <= 0) return toast('Informe o volume', true);
    const time = $('water-time').value;
    const source = $('water-source').value.trim();
    const dt = today();

    if (!D.water[dt]) D.water[dt] = [];
    D.water[dt].push({ time, vol, source, auto: false });
    D.water[dt].sort((a, b) => a.time.localeCompare(b.time));

    save();
    document.querySelector('.modal-overlay').remove();
    toast(`ð§ ${vol}ml registrado`);
    rHydro();
}

        <div class="card mb-12">

                <div style="flex:1"><div class="goal-label">ProteÃ­na</div><div class="goal-value">${D.goals[dayType].prot}g</div></div>
                <button class="btn btn-outline btn-sm" onclick="editGoal('prot','${dayType}')">Editar</button>
            </div>
            <div class="goal-card" style="margin-bottom:0">
                <div class="goal-icon" style="background:var(--blue-bg);color:var(--blue)">ð§</div>
                <div style="flex:1"><div class="goal-label">HidrataÃ§Ã£o</div><div class="goal-value">${fmtN(D.goals[dayType].water)} ml</div></div>
                <button class="btn btn-outline btn-sm" onclick="editGoal('water','${dayType}')">Editar</button>

        </div>

        <div class="card mb-12">
            <div class="card-title">Regras AutomÃ¡ticas</div>
            ${['Tipo de dia detectado pelo dia da semana (Dom = descanso)',
               'Metas ajustam automaticamente (treino vs descanso)',
               'Alerta se carne < 150g no almoÃ§o',
               'Alerta se queijo > 70g por refeiÃ§Ã£o',
               'Alerta se proteÃ­na < 60% Ã s 14h',
               'Gap hidrataÃ§Ã£o: alerta se sem Ã¡gua por 2h+ (atÃ© 17h)'].map(r => `
            <div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)">
                <span style="color:var(--green)">â</span>
                <span style="font-size:12px;color:var(--text)">${r}</span>
            </div>`).join('')}
        </div>

        <div class="card mb-12">
            <div class="card-title">Sinais Vitais Hoje</div>
            <div class="form-group">
                <label class="form-label">Peso (kg)</label>
                <input type="number" class="form-input" value="${D.peso}" step="0.1" onchange="D.peso=parseFloat(this.value);save()">
            </div>
            <div style="display:flex;gap:8px">
                <div class="form-group" style="flex:1">
                    <label class="form-label">PA (ex: 112/71)</label>
                    <input type="text" class="form-input" value="${(D.vitals[today()] || {}).pa || ''}" placeholder="120/80" onchange="saveVital('pa',this.value)">
                </div>
                <div class="form-group" style="flex:1">
                    <label class="form-label">FC Repouso</label>
                    <input type="number" class="form-input" value="${(D.vitals[today()] || {}).fc || ''}" placeholder="76" onchange="saveVital('fc',parseInt(this.value))">
                </div>
            </div>
        </div>

        <div class="card mb-12">
            <div class="card-title">ConfiguraÃ§Ãµes</div>
            <div class="cfg-item">
                <div><div class="cfg-label">Tema escuro</div><div class="cfg-desc">Alternar entre claro e escuro</div></div>
                <button class="toggle ${D.theme === 'dark' ? 'on' : ''}" onclick="toggleTheme()"></button>

                <div><div class="cfg-label">VersÃ£o</div><div class="cfg-desc">v${APP_VERSION}</div></div>

                <button class="btn btn-outline btn-sm" style="color:var(--red)" onclick="logout()">Sair</button>

}

function editGoal(field, dayType) {
    const labels = { kcal: 'Calorias (kcal)', prot: 'ProteÃ­na (g)', water: 'HidrataÃ§Ã£o (ml)' };
    const val = prompt(labels[field] + ':', D.goals[dayType][field]);
    if (val !== null && !isNaN(parseFloat(val))) {
        D.goals[dayType][field] = parseFloat(val);
        save();
        rGoals();
        toast('Meta atualizada');
    }
}

function saveVital(field, value) {
    const dt = today();
    if (!D.vitals[dt]) D.vitals[dt] = {};
    D.vitals[dt][field] = value;
    save();
}

function toggleTheme() {
    D.theme = D.theme === 'dark' ? 'light' : 'dark';
    document.body.classList.toggle('light', D.theme === 'light');
    save();
    rGoals();
}

if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(e => console.log('SW error:', e));
}

// ========== AUTO-SAVE INTERVAL ==========
setInterval(() => { if (U && D) save(); }, 120000); // 2 min
